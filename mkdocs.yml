site_name: "Programação Web 2 - Uma abordagem usando Node/Express"
site_description: "Material do Curso de Programação Web 2 do curso de Bacharelado em Desenvolvimento de Sistemas do IFAL-Maceió"
site_url: "https://leofernandesmo.github.io/pweb2-book/"
repo_url: "https://github.com/leofernandesmo/pweb2-book/"
repo_name: "GitHub"

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.integrate
  palette:
    - scheme: default
      primary: green
      accent: light-green
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: green
      accent: light-green
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/leofernandesmo"

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - print-site:
      add_to_navigation: true
      print_page_title: "Print / Save PDF"

extra_javascript:
  - assets/js/quiz.js
  - assets/js/code-runner.js

extra_css:
  - assets/extra.css
  - assets/css/custom.css

nav:
  - Home: index.md
  - Cover: cover.md
  - Title Page: title-page.md
  - Preface: preface.md
  - Chapters:
      - "0. Como Usar Este Material": chapters/00-how-to-use.md
      - "1. Web e Ferramentas (Revisão)": chapters/01-revisao-web.md
      - "2. Fundamentos do Node.js": chapters/02-introducao.md
      - "3. Express: Rotas, Middlewares, Controllers e Estrutura de Projeto": chapters/03-express.md
      - "4. Arquitetura de Software: MVC, Services e Repository Pattern": chapters/04-arquitetura.md      
      - "5. Banco de Dados e ORM: Prisma e Sequelize": chapters/05-persistencia.md
      - "6. Renderização no Servidor com EJS": chapters/06-ejs.md
      - "7. Integração com Frontend Moderno: Vue.js e React": chapters/07-frontend.md
      - "8. Autenticação e Autorização": chapters/08-aut.md
      - "9. Testes Automatizados: Jest, Supertest e Playwright": chapters/09-testes.md
      - "10. Segurança": chapters/10-seguranca.md
      - "11. Deploy e Infraestrutura": chapters/11-deploy.md
      - "Apêndice A": chapters/apendice-cheatsheet.md
      - "Apêndice B": chapters/apendice-command-summaries.md
  - Atividades:
      - "Sobre as Atividades": assignments/README.md
      - "2026.1":
          - "Atividade 05 — Rastreamento de Entregas (Cap. 4)": assignments/2026.1/cap04-arquitetura-inicial-delivery-track.md
          - "Atividade 06 — Repository e DI (Cap. 4)": assignments/2026.1/cap04-arquitetura-repository-di.md
          - "Atividade 07 — Persistência com SQL Puro (Cap. 5)": assignments/2026.1/cap05-banco-sql.md
          - "Atividade 08 — Migração para Prisma ORM (Cap. 5)": assignments/2026.1/cap05-banco-orm.md
          - "Atividade 09 — Painel Administrativo com EJS (Cap. 6)": assignments/2026.1/cap06-renderizacao-ejs.md
          - "Atividade 10 — Dashboard com Vue.js (Cap. 7)": assignments/2026.1/cap07-vue.md
          - "Atividade 11 — Autenticação e Autorização com JWT (Cap. 8)": assignments/2026.1/cap08-auth.md
          - "Atividade 12 — Testes Automatizados (Cap. 9)": assignments/2026.1/cap09-testes1.md
          - "Atividade 13 — Hardening e Segurança (Cap. 10)": assignments/2026.1/cap10-seguranca.md
          - "Atividade 14 — Deploy em Produção (Cap. 11)": assignments/2026.1/cap11-deploy.md
          - "Atividade 15 — Projeto Final": assignments/2026.1/cap99-integracao.md
  - Back Cover: back-cover.md
