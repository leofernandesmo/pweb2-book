site_name: "Programação Web 2 - Uma abordagem usando Node/Express"
site_description: "Material do Curso de Programação Web 2 do curso de Bacharelado em Desenvolvimento de Sistemas do IFAL-Maceió"
site_url: "https://leofernandesmo.github.io/pweb2-book/"
repo_url: "https://github.com/leofernandesmo/pweb2-book/"
repo_name: "GitHub"

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.integrate
  palette:
    - scheme: default
      primary: green
      accent: light-green
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: green
      accent: light-green
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/leofernandesmo"

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - print-site:
      add_to_navigation: true
      print_page_title: "Print / Save PDF"

extra_javascript:
  - assets/js/quiz.js
  - assets/js/code-runner.js

extra_css:
  - assets/extra.css
  - assets/css/custom.css

nav:
  - Home: index.md
  - Cover: cover.md
  - Title Page: title-page.md
  - Preface: preface.md
  - Chapters:
      - "0. Como Usar Este Material": chapters/00-how-to-use.md
      - "1. Fundamentos do Node.js": chapters/01-introducao.md
      - "2. Express: Rotas, Middlewares, Controllers e Estrutura de Projeto": chapters/02-express.md
      - "3. Arquitetura de Software: MVC, Services e Repository Pattern": chapters/03-arquitetura.md      
      - "Apêndice A": chapters/apendice-cheatsheet.md
      - "Apêndice B": chapters/apendice-command-summaries.md
  - Back Cover: back-cover.md
